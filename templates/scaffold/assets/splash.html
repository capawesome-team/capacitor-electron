<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{APP_NAME}}</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        color: #1a1a1a;
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          sans-serif;
      }
      .app-name {
        font-size: 1.5rem;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #1a1a1a;
          color: #f5f5f5;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-name">{{APP_NAME}}</div>
  </body>
</html>
