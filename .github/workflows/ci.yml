name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - ".vscode/**"
  pull_request:
    paths-ignore:
      - "**.md"
      - ".vscode/**"
  workflow_dispatch:

env:
  NODE_VERSION: 24

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install Node.js dependencies
        run: npm ci
      - name: Build package
        run: npm run build
      - name: Run tests
        run: npm run test
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install Node.js dependencies
        run: npm ci
      - name: Lint package
        run: npm run lint
  e2e:
    name: E2E
    runs-on: ${{ matrix.os }}
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest
        # Latest stable and the documented support floor.
        electron-version:
          - latest
          - '28'
        # '' = the Capacitor version committed in example/package.json (latest).
        capacitor-version:
          - ''
        include:
          # Older supported Capacitor majors, each on its era's minimum
          # Node version that the example toolchain still supports.
          - os: ubuntu-latest
            electron-version: latest
            capacitor-version: '6'
            node-version: 20
          - os: ubuntu-latest
            electron-version: latest
            capacitor-version: '7'
            node-version: 20
    defaults:
      run:
        working-directory: example
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js ${{ matrix.node-version || env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version || env.NODE_VERSION }}
      - name: Build platform
        working-directory: '.'
        run: |
          npm ci
          npm run build
      - name: Install example dependencies
        run: npm install
      - name: Pin Capacitor ${{ matrix.capacitor-version }}
        if: matrix.capacitor-version != ''
        run: npm install @capacitor/core@^${{ matrix.capacitor-version }}.0.0 @capacitor/app@^${{ matrix.capacitor-version }}.0.0 @capacitor/cli@^${{ matrix.capacitor-version }}.0.0
      - name: Install electron project dependencies
        working-directory: example/electron
        run: |
          npm install
          npm install --save-dev electron@${{ matrix.electron-version }}
      - name: Build, sync, and package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          npm run build
          npm run sync
          npm run pack
      - name: Run e2e (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum npx playwright test
      - name: Run e2e
        if: runner.os != 'Linux'
        run: npx playwright test
