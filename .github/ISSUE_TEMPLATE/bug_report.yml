name: 🚨 Bug report
title: "bug: "
description: Create a bug report to help us improve
labels: ["bug/fix", "needs: triage"]

body:
  - type: input
    attributes:
      label: Version
      description: |
        Let us know the version number of `@capawesome/capacitor-electron` that this bug affects. Please make sure you are using the latest version before reporting an issue. Chances are that the bug you discovered has already been fixed in a subsequent version.
      placeholder: 0.0.1
    validations:
      required: true
  - type: input
    attributes:
      label: Electron version
      description: Let us know the Electron version you are using.
      placeholder: 37.0.0
    validations:
      required: true
  - type: checkboxes
    attributes:
      label: Operating system(s)
      description: Select the operating systems that this bug affects.
      options:
        - label: macOS
        - label: Windows
        - label: Linux
  - type: textarea
    attributes:
      label: Current behavior
      description: A concise description of what you're experiencing.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected behavior
      description: A concise description of what you expected to happen.
    validations:
      required: true
  - type: input
    attributes:
      label: Reproduction
      description: |
        Please provide a [Minimal, Reproducible Example](https://stackoverflow.com/help/minimal-reproducible-example) in a public GitHub repository so that we can debug the issue.
      placeholder: https://github.com/...
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behaviour using the provided example.
      placeholder: |
        1. In this environment...
        2. With this config...
        3. Run '...'
        4. See error...
    validations:
      required: true
  - type: textarea
    attributes:
      label: Other information
      description: List any other information that is relevant to your issue. Device information, stack traces, screenshots, related issues, etc.
  - type: textarea
    attributes:
      label: Capacitor doctor
      description: Run `npx cap doctor` in a terminal and paste the output below.
    validations:
      required: true
  - type: checkboxes
    attributes:
      label:  Before submitting
      description: |
        A well-written bug report allows the maintainers to quickly recreate the necessary conditions to inspect the bug and quickly find its root cause.
        Please ensure your bug report fulfills all of the following requirements.
      options:
      - label: I have read and followed the [bug report guidelines](https://capawesome.io/docs/contributing/bug-reports/).
        required: true
      - label: I have attached links to possibly related issues and discussions.
        required: true
      - label: I understand that incomplete issues (e.g. without reproduction) are closed.
        required: true
